<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Screenshot Log</title>
  <style>
    body { font-family: -apple-system, sans-serif; background: #1a1a1a; color: #fff; padding: 20px; }
    h1 { margin-bottom: 20px; }
    .gallery { display: flex; flex-direction: column; gap: 16px; }
    .entry { background: #2a2a2a; border-radius: 8px; padding: 12px; }
    .entry img { width: 100%; border-radius: 4px; }
    .entry p { color: #999; font-size: 14px; margin-top: 8px; }
  </style>
</head>
<body>
  <h1>Screenshot Log</h1>
  <div class="gallery" id="gallery"></div>
  <script>
    fetch('screenshots/log.json')
      .then(r => r.json())
      .then(entries => {
        const gallery = document.getElementById('gallery');
        entries.reverse().forEach(e => {
          const div = document.createElement('div');
          div.className = 'entry';
          div.innerHTML = `<img src="screenshots/${e.file}" alt="screenshot"><p>${e.time}</p>`;
          gallery.appendChild(div);
        });
      })
      .catch(() => {
        document.getElementById('gallery').innerHTML = '<p>No screenshots yet.</p>';
      });
  </script>
</body>
</html>
