<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#000000">
  <title>Uber AI Earnings</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #000;
      color: #fff;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #loading {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
      transition: opacity 0.3s ease;
    }

    #loading.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #333;
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    #loading p {
      margin-top: 16px;
      color: #999;
      font-size: 14px;
    }

    #webview {
      flex: 1;
      width: 100%;
      border: none;
    }

    #navbar {
      display: flex;
      align-items: center;
      justify-content: space-around;
      background: #111;
      padding: 8px 0;
      padding-bottom: max(8px, env(safe-area-inset-bottom));
      border-top: 1px solid #222;
    }

    .nav-btn {
      background: none;
      border: none;
      color: #999;
      font-size: 20px;
      padding: 8px 16px;
      cursor: pointer;
      border-radius: 8px;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      min-width: 48px;
      min-height: 48px;
    }

    .nav-btn:active {
      background: #222;
      color: #fff;
    }

    .nav-btn:disabled {
      color: #444;
    }

    .nav-btn svg {
      width: 24px;
      height: 24px;
      fill: currentColor;
    }

    #url-bar {
      display: flex;
      align-items: center;
      background: #1a1a1a;
      padding: 4px 12px;
      padding-top: max(4px, env(safe-area-inset-top));
    }

    #url-display {
      flex: 1;
      color: #666;
      font-size: 12px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      text-align: center;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #4CAF50;
      margin-right: 8px;
      flex-shrink: 0;
    }

    .status-dot.loading {
      background: #FF9800;
      animation: pulse 1s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
  </style>
</head>
<body>
  <div id="loading">
    <div class="spinner"></div>
    <p>Uber AI Earnings を読み込み中...</p>
  </div>

  <div id="url-bar">
    <div class="status-dot" id="status-dot"></div>
    <div id="url-display">earn-uberaisolutions.uber.com</div>
  </div>

  <iframe id="webview" src="https://earn-uberaisolutions.uber.com" sandbox="allow-same-origin allow-scripts allow-forms allow-popups allow-popups-to-escape-sandbox" allow="camera; microphone; geolocation"></iframe>

  <nav id="navbar">
    <button class="nav-btn" id="btn-back" onclick="goBack()" title="戻る">
      <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
    </button>
    <button class="nav-btn" id="btn-forward" onclick="goForward()" title="進む">
      <svg viewBox="0 0 24 24"><path d="M12 4l-1.41 1.41L16.17 11H4v2h12.17l-5.58 5.59L12 20l8-8z"/></svg>
    </button>
    <button class="nav-btn" id="btn-reload" onclick="reload()" title="リロード">
      <svg viewBox="0 0 24 24"><path d="M17.65 6.35A7.958 7.958 0 0012 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08A5.99 5.99 0 0112 18c-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
    </button>
    <button class="nav-btn" id="btn-home" onclick="goHome()" title="ホーム">
      <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
    </button>
    <button class="nav-btn" id="btn-external" onclick="openExternal()" title="ブラウザで開く">
      <svg viewBox="0 0 24 24"><path d="M19 19H5V5h7V3H5a2 2 0 00-2 2v14a2 2 0 002 2h14c1.1 0 2-.9 2-2v-7h-2v7zM14 3v2h3.59l-9.83 9.83 1.41 1.41L19 6.41V10h2V3h-7z"/></svg>
    </button>
  </nav>

  <script>
    const TARGET_URL = 'https://earn-uberaisolutions.uber.com';
    const webview = document.getElementById('webview');
    const loading = document.getElementById('loading');
    const statusDot = document.getElementById('status-dot');
    const urlDisplay = document.getElementById('url-display');

    webview.addEventListener('load', () => {
      loading.classList.add('hidden');
      statusDot.classList.remove('loading');
    });

    statusDot.classList.add('loading');

    // Hide loading after timeout in case load event doesn't fire
    setTimeout(() => {
      loading.classList.add('hidden');
      statusDot.classList.remove('loading');
    }, 10000);

    function goBack() {
      window.history.back();
    }

    function goForward() {
      window.history.forward();
    }

    function reload() {
      statusDot.classList.add('loading');
      webview.src = webview.src;
      setTimeout(() => statusDot.classList.remove('loading'), 5000);
    }

    function goHome() {
      statusDot.classList.add('loading');
      webview.src = TARGET_URL;
    }

    function openExternal() {
      window.open(TARGET_URL, '_blank');
    }

    // Register service worker for PWA
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    }
  </script>
</body>
</html>
