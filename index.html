<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#000000">
  <title>Uber AI Earnings</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <meta http-equiv="refresh" content="0;url=https://earn-uberaisolutions.uber.com">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #000;
      color: #fff;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #333;
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    p { color: #999; font-size: 14px; margin-bottom: 24px; }
    a {
      color: #4CAF50;
      text-decoration: none;
      font-size: 16px;
      padding: 12px 24px;
      border: 1px solid #4CAF50;
      border-radius: 8px;
    }
  </style>
</head>
<body>
  <div class="spinner"></div>
  <p>Uber AI Earnings へ移動中...</p>
  <a href="https://earn-uberaisolutions.uber.com">タップして開く</a>
  <script>
    window.location.href = 'https://earn-uberaisolutions.uber.com';
  </script>
</body>
</html>
